{{- include "optio.validateNetworking" . }}
{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "optio.labels" . | nindent 4 }}
  annotations:
    {{- if and .Values.ingress.gke .Values.ingress.gke.enabled }}
    {{- if .Values.ingress.gke.staticIpName }}
    kubernetes.io/ingress.global-static-ip-name: {{ .Values.ingress.gke.staticIpName | quote }}
    {{- end }}
    {{- if and .Values.ingress.gke.managedCertificate .Values.ingress.gke.managedCertificate.enabled }}
    networking.gke.io/managed-certificates: {{ .Release.Name }}-managed-cert
    {{- end }}
    {{- else }}
    {{- if and .Values.ingress.certManager .Values.ingress.certManager.enabled }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.certManager.clusterIssuer | quote }}
    {{- end }}
    # Block /api/internal/* from public traffic — these endpoints use bearer
    # token auth (not session auth) and must only be reachable within the cluster.
    # Pods access them via the K8s service DNS, which bypasses the ingress.
    nginx.ingress.kubernetes.io/server-snippet: |
      location /api/internal/ {
        return 404;
      }
    {{- end }}
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if and .Values.ingress.certManager .Values.ingress.certManager.enabled }}
  tls:
    {{- range .Values.ingress.hosts }}
    - hosts:
        - {{ .host | quote }}
      secretName: {{ .host | replace "." "-" }}-tls
    {{- end }}
  {{- else if .Values.ingress.tls }}
  tls:
    {{- toYaml .Values.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ $.Release.Name }}-{{ .service }}
                port:
                  number: {{ if eq .service "api" }}{{ $.Values.api.port }}{{ else }}{{ $.Values.web.port }}{{ end }}
          {{- end }}
    {{- end }}
{{- end }}
