    "runs-on": "arc-runner-2"
    "steps":
    - "name": "install jq curl"
      "run": "apk add --no-cache jq curl"
    - "env":
        "GITHUB_REPOSITORY": "${{ github.repository }}"
        "GITHUB_TOKEN": "${{ github.token }}"
